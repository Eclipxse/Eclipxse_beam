name: Feature request
description: Suggest a useful improvement for Eclipxse Beam.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation before describing the feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Explain how the feature should work from a user's perspective.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or different designs you considered.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I considered whether this feature changes Beam's privacy or security model.
          required: true
