name: Build Windows EXE

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  windows:
    name: Windows installer and portable app
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Windows executables
        run: npm run desktop:build

      - name: Write checksums
        shell: pwsh
        run: |
          Get-ChildItem release -Filter *.exe |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $(Split-Path $_.Path -Leaf)" } |
            Set-Content release/SHA256SUMS.txt

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: Eclipxse-Beam-Windows
          path: |
            release/*.exe
            release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
